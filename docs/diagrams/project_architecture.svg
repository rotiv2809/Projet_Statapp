<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .group { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
      .node { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 10; }
      .label { font: 600 14px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 12px Arial, sans-serif; fill: #334155; }
      .edge { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="24" y="42" class="title">StatApp Project Architecture (Current Code)</text>

  <!-- Entry -->
  <rect x="24" y="70" width="280" height="260" class="group"/>
  <text x="44" y="98" class="label">Entry Points</text>
  <rect x="44" y="115" width="240" height="52" class="node"/>
  <text x="164" y="147" class="label" text-anchor="middle">User</text>
  <rect x="44" y="185" width="240" height="60" class="node"/>
  <text x="164" y="215" class="label" text-anchor="middle">Streamlit UI</text>
  <text x="164" y="233" class="small" text-anchor="middle">streamlit_app.py</text>
  <rect x="44" y="262" width="240" height="60" class="node"/>
  <text x="164" y="292" class="label" text-anchor="middle">CLI</text>
  <text x="164" y="310" class="small" text-anchor="middle">app/main.py</text>

  <!-- Orchestrator -->
  <rect x="334" y="160" width="330" height="100" class="node"/>
  <text x="499" y="198" class="label" text-anchor="middle">Pipeline Orchestrator</text>
  <text x="499" y="220" class="small" text-anchor="middle">app/pipeline/data_pipeline.py</text>

  <!-- Agents -->
  <rect x="700" y="70" width="330" height="430" class="group"/>
  <text x="720" y="98" class="label">Multi-Agent Layer</text>
  <rect x="720" y="115" width="290" height="52" class="node"/>
  <text x="865" y="147" class="label" text-anchor="middle">GuardrailsAgent</text>
  <rect x="720" y="182" width="290" height="52" class="node"/>
  <text x="865" y="214" class="label" text-anchor="middle">SQLAgent</text>
  <rect x="720" y="249" width="290" height="52" class="node"/>
  <text x="865" y="281" class="label" text-anchor="middle">ErrorAgent</text>
  <rect x="720" y="316" width="290" height="52" class="node"/>
  <text x="865" y="348" class="label" text-anchor="middle">AnalysisAgent</text>
  <rect x="720" y="383" width="290" height="52" class="node"/>
  <text x="865" y="415" class="label" text-anchor="middle">VizAgent</text>

  <!-- Safety + data -->
  <rect x="1060" y="70" width="516" height="430" class="group"/>
  <text x="1080" y="98" class="label">Safety, Data, and Helpers</text>

  <rect x="1080" y="115" width="230" height="60" class="node"/>
  <text x="1195" y="145" class="label" text-anchor="middle">gatekeeper.py</text>
  <text x="1195" y="163" class="small" text-anchor="middle">+ schemas.py</text>

  <rect x="1328" y="115" width="230" height="60" class="node"/>
  <text x="1443" y="140" class="label" text-anchor="middle">RouterAgent</text>
  <text x="1443" y="160" class="small" text-anchor="middle">router_agent.py</text>

  <rect x="1080" y="192" width="230" height="60" class="node"/>
  <text x="1195" y="226" class="label" text-anchor="middle">sql_validator.py</text>

  <rect x="1080" y="269" width="230" height="60" class="node"/>
  <text x="1195" y="300" class="label" text-anchor="middle">execute_sql.py</text>

  <rect x="1328" y="269" width="230" height="60" class="node"/>
  <text x="1443" y="300" class="label" text-anchor="middle">sqlite.py + SQLite DB</text>

  <rect x="1080" y="346" width="230" height="60" class="node"/>
  <text x="1195" y="377" class="label" text-anchor="middle">format_response.py</text>

  <rect x="1328" y="346" width="230" height="60" class="node"/>
  <text x="1443" y="377" class="label" text-anchor="middle">viz_plotly.py fallback</text>

  <rect x="1328" y="192" width="230" height="60" class="node"/>
  <text x="1443" y="220" class="label" text-anchor="middle">llm/factory.py</text>
  <text x="1443" y="238" class="small" text-anchor="middle">OpenAI / Google / Ollama</text>

  <!-- Optional LangGraph -->
  <rect x="334" y="560" width="1242" height="300" class="group"/>
  <text x="354" y="588" class="label">Optional Graph Runtime</text>
  <rect x="354" y="615" width="420" height="84" class="node"/>
  <text x="564" y="650" class="label" text-anchor="middle">langgraph_flow.py</text>
  <text x="564" y="670" class="small" text-anchor="middle">build_text2sql_graph()</text>
  <rect x="804" y="615" width="740" height="180" class="node"/>
  <text x="1174" y="650" class="label" text-anchor="middle">Reuses the same modules as sync pipeline</text>
  <text x="1174" y="682" class="small" text-anchor="middle">Agents: guardrails, router, sql, error, analysis, viz</text>
  <text x="1174" y="706" class="small" text-anchor="middle">Helpers: execute_sql, sql_validator, sqlite, format_response, viz_plotly</text>

