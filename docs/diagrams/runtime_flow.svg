<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="980" viewBox="0 0 1300 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .node { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 10; }
      .decision { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2; }
      .end { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 10; }
      .ok { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .label { font: 600 14px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 12px Arial, sans-serif; fill: #334155; }
      .edge { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .note { font: 600 12px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <text x="30" y="45" class="title">Runtime Request Flow (Synchronous Pipeline)</text>

  <rect x="60" y="90" width="260" height="64" class="node" />
  <text x="190" y="128" class="label" text-anchor="middle">Question from UI / CLI</text>

  <rect x="60" y="185" width="260" height="64" class="node" />
  <text x="190" y="223" class="label" text-anchor="middle">Load Schema</text>

  <rect x="60" y="280" width="260" height="74" class="node" />
  <text x="190" y="314" class="label" text-anchor="middle">GuardrailsAgent.evaluate</text>
  <text x="190" y="334" class="small" text-anchor="middle">gatekeeper + router</text>

  <rect x="390" y="260" width="250" height="70" class="end" />
  <text x="515" y="300" class="label" text-anchor="middle">OUT_OF_SCOPE</text>
  <rect x="390" y="345" width="250" height="70" class="end" />
  <text x="515" y="385" class="label" text-anchor="middle">NEEDS CLARIFICATION</text>

  <rect x="60" y="390" width="260" height="64" class="node" />
  <text x="190" y="428" class="label" text-anchor="middle">SQLAgent.generate_sql</text>

  <rect x="60" y="485" width="260" height="64" class="node" />
  <text x="190" y="523" class="label" text-anchor="middle">validate_sql</text>

  <polygon points="500,510 620,560 500,610 380,560" class="decision" />
  <text x="500" y="565" class="label" text-anchor="middle">Valid?</text>

  <rect x="60" y="585" width="260" height="64" class="node" />
  <text x="190" y="623" class="label" text-anchor="middle">execute_sql</text>

  <polygon points="500,690 620,740 500,790 380,740" class="decision" />
  <text x="500" y="745" class="label" text-anchor="middle">Execution OK?</text>

  <rect x="700" y="620" width="280" height="80" class="node" />
  <text x="840" y="655" class="label" text-anchor="middle">ErrorAgent.repair_sql</text>
  <text x="840" y="676" class="small" text-anchor="middle">question + schema + error</text>

  <polygon points="1080,640 1220,690 1080,740 940,690" class="decision" />
  <text x="1080" y="695" class="label" text-anchor="middle">Retry left?</text>
  <rect x="940" y="765" width="280" height="70" class="end" />
  <text x="1080" y="805" class="label" text-anchor="middle">ERROR (max retry)</text>

  <rect x="60" y="760" width="260" height="64" class="node" />
  <text x="190" y="798" class="label" text-anchor="middle">format_response</text>

  <rect x="360" y="840" width="260" height="64" class="node" />
  <text x="490" y="878" class="label" text-anchor="middle">AnalysisAgent.summarize</text>

  <rect x="660" y="840" width="260" height="64" class="node" />
  <text x="790" y="878" class="label" text-anchor="middle">VizAgent.generate</text>

  <rect x="960" y="840" width="260" height="64" class="ok" />
  <text x="1090" y="878" class="label" text-anchor="middle">Return final payload</text>

  <path class="edge" d="M190 154 L190 185" />
  <path class="edge" d="M190 249 L190 280" />
  <path class="edge" d="M320 308 L390 295" />
  <path class="edge" d="M320 324 L390 380" />
  <path class="edge" d="M190 354 L190 390" />
  <path class="edge" d="M190 454 L190 485" />
  <path class="edge" d="M320 517 L380 560" />
  <path class="edge" d="M500 610 L500 690" />
  <path class="edge" d="M500 790 L500 840" />
  <path class="edge" d="M500 840 L660 840" />
  <path class="edge" d="M920 872 L960 872" />

  <path class="edge" d="M380 560 L320 560 L320 617" />
  <text x="325" y="580" class="note">yes</text>
  <path class="edge" d="M500 610 L500 620 L700 620" />
  <text x="545" y="635" class="note">no</text>

  <path class="edge" d="M320 617 L320 740 L380 740" />
  <path class="edge" d="M620 740 L700 690" />
  <text x="640" y="730" class="note">no</text>
  <path class="edge" d="M620 560 L620 740" />
  <text x="626" y="640" class="note">yes</text>

  <path class="edge" d="M980 690 L940 690" />
  <path class="edge" d="M1080 740 L1080 765" />
  <path class="edge" d="M1220 690 L1240 690 L1240 560 L620 560" />
  <text x="1140" y="675" class="note">yes</text>
  <text x="1068" y="758" class="note">no</text>

  <path class="edge" d="M320 792 L360 872" />
  <path class="edge" d="M620 872 L660 872" />
</svg>
