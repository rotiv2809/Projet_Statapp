<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .node { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 10; }
      .decision { fill: #fef9c3; stroke: #ca8a04; stroke-width: 2; }
      .end { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 10; }
      .ok { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .label { font: 600 14px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 12px Arial, sans-serif; fill: #334155; }
      .edge { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .note { font: 600 12px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <text x="30" y="45" class="title">Runtime Flow (Synchronous Pipeline)</text>

  <!-- Main vertical path -->
  <rect x="120" y="80" width="360" height="62" class="node"/>
  <text x="300" y="118" class="label" text-anchor="middle">1. Question from UI/CLI</text>

  <rect x="120" y="165" width="360" height="62" class="node"/>
  <text x="300" y="203" class="label" text-anchor="middle">2. Load schema (sqlite.py)</text>

  <rect x="120" y="250" width="360" height="74" class="node"/>
  <text x="300" y="284" class="label" text-anchor="middle">3. GuardrailsAgent.evaluate</text>
  <text x="300" y="304" class="small" text-anchor="middle">gatekeeper + router</text>

  <rect x="120" y="350" width="360" height="62" class="node"/>
  <text x="300" y="388" class="label" text-anchor="middle">4. SQLAgent.generate_sql</text>

  <polygon points="300,435 420,485 300,535 180,485" class="decision"/>
  <text x="300" y="490" class="label" text-anchor="middle">5. validate_sql?</text>

  <rect x="120" y="560" width="360" height="62" class="node"/>
  <text x="300" y="598" class="label" text-anchor="middle">6. execute_sql</text>

  <polygon points="300,645 420,695 300,745 180,695" class="decision"/>
  <text x="300" y="700" class="label" text-anchor="middle">Execution OK?</text>

  <rect x="120" y="770" width="360" height="62" class="node"/>
  <text x="300" y="808" class="label" text-anchor="middle">7. format_response</text>

  <rect x="540" y="770" width="360" height="62" class="node"/>
  <text x="720" y="808" class="label" text-anchor="middle">8. AnalysisAgent.summarize</text>

  <rect x="960" y="770" width="360" height="62" class="node"/>
  <text x="1140" y="808" class="label" text-anchor="middle">9. VizAgent.generate</text>
  <text x="1140" y="826" class="small" text-anchor="middle">fallback: viz_plotly</text>

  <rect x="960" y="860" width="360" height="62" class="ok"/>
  <text x="1140" y="898" class="label" text-anchor="middle">10. Return final payload</text>

  <!-- Guardrail exits -->
  <rect x="560" y="245" width="320" height="62" class="end"/>
  <text x="720" y="283" class="label" text-anchor="middle">Return OUT_OF_SCOPE message</text>

  <rect x="560" y="325" width="320" height="62" class="end"/>
  <text x="720" y="363" class="label" text-anchor="middle">Return CLARIFY question</text>

  <!-- Retry loop on right -->
  <rect x="560" y="455" width="320" height="72" class="node"/>
  <text x="720" y="490" class="label" text-anchor="middle">ErrorAgent.repair_sql</text>
  <text x="720" y="510" class="small" text-anchor="middle">question + schema + error</text>

  <polygon points="1040,450 1170,500 1040,550 910,500" class="decision"/>
  <text x="1040" y="505" class="label" text-anchor="middle">Retry left?</text>

  <rect x="910" y="575" width="260" height="62" class="end"/>
  <text x="1040" y="613" class="label" text-anchor="middle">Return ERROR</text>

  <!-- Main arrows -->
  <path class="edge" d="M300 142 L300 165"/>
  <path class="edge" d="M300 227 L300 250"/>
  <path class="edge" d="M300 324 L300 350"/>
  <path class="edge" d="M300 412 L300 435"/>
  <path class="edge" d="M300 535 L300 560"/>
  <path class="edge" d="M300 622 L300 645"/>
  <path class="edge" d="M300 745 L300 770"/>
  <path class="edge" d="M480 801 L540 801"/>
  <path class="edge" d="M900 801 L960 801"/>
  <path class="edge" d="M1140 832 L1140 860"/>

  <!-- Guardrail branch arrows -->
  <path class="edge" d="M480 272 L560 276"/>
  <text x="510" y="266" class="note">OUT_OF_SCOPE</text>
  <path class="edge" d="M480 302 L560 356"/>
  <text x="506" y="334" class="note">NEEDS CLARIFICATION</text>

  <!-- Validate branch -->
  <path class="edge" d="M420 485 L560 491"/>
  <text x="470" y="478" class="note">invalid</text>
  <path class="edge" d="M300 535 L300 560"/>
  <text x="318" y="550" class="note">valid</text>

  <!-- Execute branch -->
  <path class="edge" d="M420 695 L560 491"/>
  <text x="470" y="642" class="note">execution error</text>
  <path class="edge" d="M300 745 L300 770"/>
  <text x="318" y="760" class="note">success</text>

  <!-- Retry arrows -->
  <path class="edge" d="M880 491 L910 500"/>
  <path class="edge" d="M1040 550 L1040 575"/>
  <text x="1052" y="565" class="note">no</text>
  <path class="edge" d="M1170 500 L1240 500 L1240 485 L420 485"/>
  <text x="1184" y="492" class="note">yes</text>
</svg>
